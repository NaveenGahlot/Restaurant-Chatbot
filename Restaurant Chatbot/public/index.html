<!-- -- user input
// breakfast
// POST(/api/chat) -- call agent
return --- show to the frontend -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Chatbot</title>
    <style>
        body { 
            font-family: sans-serif; max-width: 600px; margin: auto; padding: 2rem; 
        }
        input, button { 
            padding: 0.5rem; margin-top: 1rem; width: 100%; 
        }
        #chat { 
            white-space: pre-wrap; margin-top: 1rem; 
        }
    </style>

</head>
<body>
    <h2>🍽️ Restaurant AI Assistant</h2>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Ask me: What's on the dinner menu?" />
    <button onclick="sendMessage()">Send</button>
</body>
    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput').value;
            const chatDiv = document.getElementById('chat');

            if (!input.trim()) {
                return;
            }

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input })
                });
                const data = await res.json();
                const output = data?.output || "No response received.";
                chatDiv.innerText += `🧑‍💻 You: ${input}\n🤖 Bot: ${output}\n\n`;
            } catch (error) {
                console.error("Chat request failed:", error);
                chatDiv.innerText += `🧑‍💻 You: ${input}\n🤖 Bot: Sorry, the request failed.\n\n`;
            }
            document.getElementById('userInput').value = "";
        }
    </script>
</html>
